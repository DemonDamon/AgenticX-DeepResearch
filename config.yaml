# ============================================================================
# AgenticX-DeepResearch v2.0 配置文件
# 基于 AgenticX 框架重构
# ============================================================================

# LLM 提供者配置
llm:
  default_provider: "kimi"
  providers:
    kimi:
      model: "moonshot-v1-32k"
      api_key_env: "KIMI_API_KEY"
      base_url_env: "KIMI_API_BASE"
      base_url_default: "https://api.moonshot.cn/v1"
      temperature: 0.7
      max_tokens: 32000
      timeout: 300.0
      max_retries: 3
    openai:
      model: "gpt-4o"
      api_key_env: "OPENAI_API_KEY"
      base_url_env: "OPENAI_API_BASE"
      temperature: 0.7
      max_tokens: 8192
    deepseek:
      model: "deepseek-chat"
      api_key_env: "DEEPSEEK_API_KEY"
      base_url: "https://api.deepseek.com/v1"
      temperature: 0.7
      max_tokens: 8192

# 搜索引擎配置
search:
  default_engine: "bochaai"
  max_results_per_query: 10
  timeout: 30
  retry_count: 3
  engines:
    bochaai:
      enabled: true
      api_key_env: "BOCHAAI_API_KEY"
      endpoint: "https://api.bochaai.com/v1/web-search"
      market: "zh-CN"
    bing:
      enabled: false
      api_key_env: "BING_SUBSCRIPTION_KEY"
      endpoint: "https://api.bing.microsoft.com/v7.0/search"
      market: "zh-CN"
      safe_search: "Moderate"
    google:
      enabled: false
      api_key_env: "GOOGLE_API_KEY"
      cx_id_env: "GOOGLE_SEARCH_ENGINE_ID"
      fallback_api_key_env: "GEMINI_API_KEY"
      use_genai: false

# 深度搜索配置
deep_search:
  max_iterations: 5
  max_search_results: 10
  max_queries_per_iteration: 5
  quality_threshold: 0.8
  convergence_threshold: 0.95
  content_analysis_depth: "detailed"
  enable_reflection: true
  enable_knowledge_gap_detection: true
  enable_source_validation: true
  initial_query_count: 3
  followup_query_count: 2

# 智能体配置
agents:
  query_generator:
    name: "查询生成专家"
    max_queries_per_iteration: 10
    strategy_auto_select: true
    strategies:
      - "broad_exploration"
      - "focused_deep_dive"
      - "gap_filling"
      - "cross_validation"
    enable_multilingual: true
    languages: ["zh", "en"]
  planner:
    name: "研究规划专家"
    enable_adaptive_planning: true
  search_analyzer:
    name: "搜索分析专家"
    quality_threshold: 6.0
  report_writer:
    name: "报告撰写专家"
    citation_format: "APA"
    max_report_length: 10000
    include_citations: true
    include_methodology: true
    include_limitations: true
    include_recommendations: true
  research_summarizer:
    name: "首席研究分析师"

# 工作流配置
workflow:
  type: "unified_research"
  enable_parallel_search: true
  enable_interactive_mode: true
  checkpoint_interval: 1

# 知识提取配置
knowledge_extraction:
  extract_facts: true
  extract_concepts: true
  extract_procedures: true
  confidence_threshold: 0.7
  enable_fact_verification: true

# 来源验证配置
source_validation:
  check_authority: true
  check_recency: true
  check_relevance: true
  check_credibility: true
  authority_threshold: 0.7
  recency_threshold_days: 365
  relevance_threshold: 0.8
  credibility_threshold: 0.7

# 质量评估配置
quality_assessment:
  criteria:
    - "completeness"
    - "accuracy"
    - "relevance"
    - "coherence"
    - "depth"
  weights:
    completeness: 0.25
    accuracy: 0.25
    relevance: 0.20
    coherence: 0.15
    depth: 0.15
  min_quality_score: 0.7

# 输出配置
output:
  directory: "./output"
  save_intermediate: true
  formats:
    - "markdown"
    - "json"
  filename_template: "research_{topic}_{timestamp}"

# 并发配置
concurrency:
  max_concurrent_searches: 3
  max_concurrent_analysis: 2
  request_rate_limit: 10
  enable_async_processing: true

# 交互界面配置
interactive:
  enable_real_time_updates: true
  update_interval: 2.0
  enable_user_feedback: true
  enable_progress_tracking: true
  display_intermediate_results: true

# 监控配置
monitoring:
  enabled: true
  log_level: "INFO"
  metrics_collection_interval: 10.0
  metrics:
    - execution_time
    - search_count
    - loop_count
    - success_rate
    - token_usage
    - quality_score
    - iteration_count

# 缓存配置
caching:
  enable_query_cache: true
  enable_content_cache: true
  cache_ttl: 3600
  max_cache_size: 1000

# 错误处理配置
error_handling:
  max_retries: 3
  retry_delay: 1.0
  enable_graceful_degradation: true
  fallback_to_mock: true

# 安全配置
security:
  enable_content_filtering: true
  enable_rate_limiting: true
  sanitize_inputs: true
  validate_sources: true

# 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s [%(name)s] %(levelname)s: %(message)s"
  file: "./logs/research.log"
  console: true
